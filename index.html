<DOCTYPE html>
    <html>

    <head>
        <title>Documents</title>
        <script>
            var counter = 0;
            var startNumber = 0;
            var MultiNumber = 0;
            var subnumber = 0;
            function onClickAdd() {
                debugger;
                if (counter == 0) {
                    startNumber = parseInt(document.getElementById("txtstartNumber").value);
                }
                counter = counter + 1;
                startNumber = startNumber + 1;
                document.getElementById("result").innerHTML = "Result:" + startNumber + "count no:" + counter;
            }
            function onChangeAdd() {
                debugger;
                counter = 0;
            }


            function onClickMultify() {
                debugger;
                if (counter === 0) {
                    MultiNumber = parseInt(document.getElementById("txtMultiNumber").value);
                }
                MultiNumber = 0
                MultiNumber =parseInt(document.getElementById("txtMultiNumber").value);
                counter = counter + 1;
                MultiNumber = MultiNumber * counter;
                document.getElementById("Multiresult").innerHTML = "Result:" + MultiNumber + "count no:" + counter;
              
                 

            }
            function onClicksub() {
                debugger;
                if (counter == 0) {
                    subnumber = parseInt(document.getElementById("txtsubnumber").value);
                }
                counter= counter - 1;
                subnumber= subnumber - counter;
                document.getElementById("subresult").innerHTML= "answer:" + subnumber + "count no:" +counter;

            }

        </script>
    </head>

    <body>
        <h1> Data Types in Javascripts</h1>
        <p>Javascripts provides different types of data to hold different types of values</p>
        <ul>
            <li>String</li>
            <li>Number</li>
            <li>Boolean</li>
            <li>Object</li>
            <li>Arrays</li>
            <li>Null</li>
            <li>Undefined</li>
        </ul>
        <label>Enter a value</label>
        <input type="number" id="txtstartNumber" placeholder="enter a value" onchange="onChangeAdd()" />
        <button id="buttonAdd" onclick="onClickAdd()">Add</button>
        <p id="result"></p>

        <label>Enter a value</label>
        <input type="number" id="txtMultiNumber" placeholder="enter a value">
        <button id="buttonMultify" onclick="onClickMultify()">Multify</button>
        <p id="Multiresult"></p>

        <label> enter a value</label>
        <input type="number" id="txtsubnumber" placeholder="Enter a value" />
        <button id="buttonsub" onclick="onClicksub()">subtraction</button>
        <p id="subresult"></p>



    </body>

    </html>
