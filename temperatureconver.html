<!DOCTYPE html>
<html>
    <head>
        <title>Temperature Converter</title>
        <script>
function onClickConverterFToC(){
    debugger;
    cTemperature=parseFloat(document.getElementById("txttemperature").value);
    fTemperature= cTemperature*1.8+32
    document.getElementById("temperatureResult").innerHTML="result:"+ fTemperature+"f"

}
        </script>   
    </head>
    <body>
<label>Temperature:</label>
<input type="numnber" id="txttemperature" > c<br>
<button id="btnConvertCToF" onclick="onClickConverterFToC()">Convert C to F</button>
<P id="temperatureResult">result</P>

    </body>
</html>
